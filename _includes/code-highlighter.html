
<script>
document.addEventListener('DOMContentLoaded', ()=>{

  function loadHighlightCSS(theme){
    let existing = document.getElementById("hljs-theme");

    if(existing) existing.remove();

    const link = document.createElement('link');
    link.id = "hljs-theme";
    link.rel = 'stylesheet';

    link.href = theme === "dark"
      ? 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/atom-one-dark.min.css'
      : 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/atom-one-light.min.css';

    document.head.appendChild(link);
  }

  function getCurrentTheme(){
    return document.body.classList.contains("dark") ? "dark" : "light";
  }

  function initHighlight(){
    if(!window.hljs){
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js';
      script.onload = () => highlightLocalBlocks();
      document.head.appendChild(script);
    } else {
      highlightLocalBlocks();
    }
  }

  function highlightLocalBlocks(){
    document.querySelectorAll('pre > code').forEach(block=>{
      if(block.closest('.content-wrapper')) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'content-wrapper';

      const header = document.createElement('div');
      header.className = 'content-header';

      const fileName = document.createElement('span');
      fileName.className = 'content-filename';
      fileName.textContent = block.dataset.filename || 'Code';
      header.appendChild(fileName);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'code-copy';
      copyBtn.textContent = 'Copy';
      copyBtn.onclick = ()=>{
        navigator.clipboard.writeText(block.textContent);
        copyBtn.textContent='Copied!';
        setTimeout(()=>copyBtn.textContent='Copy',1500);
      };
      header.appendChild(copyBtn);

      const pre = block.parentNode;
      pre.parentNode.replaceChild(wrapper, pre);
      wrapper.appendChild(header);
      wrapper.appendChild(pre);

      if(window.hljs){
        hljs.highlightElement(block);
      }
    });
  }

  loadHighlightCSS(getCurrentTheme());
  initHighlight();

  const observer = new MutationObserver(()=>{
    loadHighlightCSS(getCurrentTheme());
  });

  observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

});
</script>
