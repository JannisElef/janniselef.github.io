
<div class="stl-container" style="position: relative;">

  <div class="content-wrapper" id="content-wrapper-{{ include.file | replace:'/','-' | replace:'.','-' }}">
    <div class="content-header">
      <a class="content-filename" href="https://github.com/{{ page.repo }}/blob/{{ page.branch }}{{ include.file }}" target="_blank" rel="noopener noreferrer">
        🔗 {{include.file | split: "/" | last }}
      </a>
      <div class="content-buttons">
        <button id="load-stl-{{ include.id }}">👁 View</button>
        <button id="download-stl-{{ include.id }}" class="stl-download">⭳ Download</button>
      </div>
    </div>

    <div id="stl-viewer-{{ include.id }}" style="width:100%; height:300px; display:none; position:relative;"></div>

  </div>
  
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from "three";
import { STLLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/STLLoader.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const btn = document.getElementById("load-stl-{{ include.id }}");
const container = document.getElementById("stl-viewer-{{ include.id }}");
const downloadBtn = document.getElementById("download-stl-{{ include.id }}");

btn.addEventListener("click", () => {

  btn.style.display = "none";
  container.style.display = "block";

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    75,
    container.clientWidth / container.clientHeight,
    0.1,
    1000
  );

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.domElement.style.borderRadius = "8px";
  renderer.domElement.style.border = `1px solid ${getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim()}`;
  container.appendChild(renderer.domElement);

  const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
  keyLight.position.set(5,5,5);
  scene.add(keyLight);

  const backLight = new THREE.DirectionalLight(0xffffff, 0.4);
  backLight.position.set(-5,3,-5);
  scene.add(backLight);

  const hemi = new THREE.HemisphereLight(0xffffff, 0x888888, 0.8);
  scene.add(hemi);

  const loader = new STLLoader();

  let mesh = null;
  let edgeLines = null;

  // Auto-Rotation
  let autoRotate = true;
  let resumeTimeout = null;
  const resumeDelay = 5000;

  function stopAutoRotateTemporarily() {
    autoRotate = false;

    if (resumeTimeout) clearTimeout(resumeTimeout);

    resumeTimeout = setTimeout(() => {
      autoRotate = true;
    }, resumeDelay);
  }

  loader.load("{{ cdn }}{{ include.file }}", (geometry) => {

    geometry.computeBoundingSphere();
    geometry.center();

    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.4,
      metalness: 0.1
    });

    mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const edges = new THREE.EdgesGeometry(geometry);
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0x2e2e2e });
    edgeLines = new THREE.LineSegments(edges, lineMaterial);
    scene.add(edgeLines);

    const radius = geometry.boundingSphere.radius;
    camera.position.set(radius * 1.5, radius * 1.5, radius * 1.5);
    camera.lookAt(geometry.boundingSphere.center);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Interaction (Rotate/Pan)
    renderer.domElement.addEventListener("pointerdown", (e) => {
      if (e.button === 0 || e.button === 2) {
        stopAutoRotateTemporarily();
      }
    });

    renderer.domElement.addEventListener("touchstart", () => {
      stopAutoRotateTemporarily();
    });

    function animate(){
      requestAnimationFrame(animate);

      if (autoRotate && mesh) {
        mesh.rotation.y += 0.005;
        edgeLines.rotation.y += 0.005;
      }

      controls.update();
      renderer.render(scene, camera);

      if(document.body.classList.contains("dark")){
        scene.background = new THREE.Color(0x282c34);
      }else{
        scene.background = new THREE.Color(0xe8e8e8);
      }
    }
    animate();

  });

  window.addEventListener("resize", () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });

});

downloadBtn.addEventListener("click", () => {
  const link = document.createElement("a");
  link.href = "{{ cdn }}{{ include.file }}";
  link.download = "{{ include.file | split: '/' | last }}";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

</script>
