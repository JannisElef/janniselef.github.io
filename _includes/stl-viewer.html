
<div class="stl-container">

  <button id="load-stl-{{ include.id }}">
    Load "{{ include.file | split: "/" | last }}"
  </button>

  <div id="stl-viewer-{{ include.id }}" style="width:100%; height:500px; display:none;"></div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from "three";
import { STLLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/STLLoader.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const btn = document.getElementById("load-stl-{{ include.id }}");
const container = document.getElementById("stl-viewer-{{ include.id }}");

btn.addEventListener("click", () => {

  btn.style.display = "none";
  container.style.display = "block";

  const scene = new THREE.Scene();

  /* let codeBgColor = getComputedStyle(document.documentElement)
                    .getPropertyValue('--code-bg-color')
                    .trim();
  scene.background = new THREE.Color(codeBgColor); */

  if(document.body.classList.contains("dark")){
    scene.background = new THREE.Color(0x282c34);
  }else{
    scene.background = new THREE.Color(0xe8e8e8);
  }

  const camera = new THREE.PerspectiveCamera(
    75,
    container.clientWidth / container.clientHeight,
    0.1,
    1000
  );

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.domElement.style.borderRadius = "8px";
  renderer.domElement.style.border = `1px solid ${getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim()}`;
  container.appendChild(renderer.domElement);

  // Beleuchtung
  const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
  keyLight.position.set(5,5,5);
  scene.add(keyLight);

  const backLight = new THREE.DirectionalLight(0xffffff, 0.4);
  backLight.position.set(-5,3,-5);
  scene.add(backLight);

  const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
  scene.add(hemi);

  // STL Loader
  const loader = new STLLoader();
  loader.load("{{ include.file }}", (geometry) => {

    geometry.computeBoundingSphere();
    geometry.center();

    // Mesh Material
    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.4,
      metalness: 0.1
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // Edge Lines
    const edges = new THREE.EdgesGeometry(geometry);
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0x2e2e2e });
    const edgeLines = new THREE.LineSegments(edges, lineMaterial);
    scene.add(edgeLines);

    // Kamera Auto-Position
    const radius = geometry.boundingSphere.radius;
    camera.position.set(radius*1.5, radius*1.5, radius*1.5);
    camera.lookAt(geometry.boundingSphere.center);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    function animate(){
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

  });

  // Resize Handling
  window.addEventListener("resize", () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });

});
</script>
